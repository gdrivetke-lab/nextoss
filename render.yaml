services:
  - type: web
    name: nextoss
    runtime: node
    repo: https://github.com/gdrivetke-lab/nextoss
    plan: free
    region: frankfurt
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
